[package]
name = "ai_autonomous_agent"
version = "0.1.0"
edition = "2021"
description = "Autonomous AI agent example using Kaneru"
license = "Apache-2.0"
publish = false

[[bin]]
name = "ai-agent"
path = "src/main.rs"

[dependencies]
kaneru = { path = "../../crates/kaneru" }
ineru = { path = "../../crates/ineru" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.9"

[package]
name = "kaneru"
version = "0.4.2"
description = "Kaneru: Unified Multi-Agent Execution System for AIngle AI agents"
license = "Apache-2.0 OR LicenseRef-Commercial"
repository = "https://github.com/ApiliumCode/aingle"
homepage = "https://apilium.com"
documentation = "https://docs.rs/kaneru"
authors = ["Apilium Technologies <hello@apilium.com>"]
keywords = ["aingle", "ai", "agents", "rl", "iot"]
categories = ["science", "network-programming"]
edition = "2021"
rust-version = "1.83"

[features]
default = ["std"]
std = []
# Enable Ineru memory integration
memory = ["ineru"]
# Enable async operations
async = []
# Enable learning capabilities
learning = []

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
log = "0.4"

# AI Memory integration
ineru = { version = "0.4", path = "../ineru", optional = true }

# Random for exploration (updated from 0.7)
rand = { version = "0.9", default-features = false, features = ["std", "thread_rng"] }

# Time
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }

[dev-dependencies]
criterion = "0.5"

[[bench]]
name = "agent_bench"
harness = false
